
name: ATHLOS CI/CD Pipeline

#
on:
  push:
    branches: [ main, 'release/**' ]  
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, 'release/**' ]


jobs:
  
  test:
    name:  Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        
      - name:  Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          
      - name:  Get dependencies
        run: flutter pub get
        
      - name:  Analyze code
        run: flutter analyze
        
      - name:  Run unit tests
        run: flutter test
        
      - name:  Generate coverage report
        run: flutter test --coverage
        
      - name:  Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false


  build:
    name:  Build App
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main'
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        
      - name:  Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          
      - name:  Get dependencies
        run: flutter pub get
        
      - name:  Get dependencies
        run: flutter pub get
        
      - name:  Build Android APK
        run: flutter build apk --release
        
      - name:  Build Android App Bundle
        run: flutter build appbundle --release
        
      - name: Build iOS (simulator)
        run: flutter build ios --release --no-codesign
        
      - name:  Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: athlos-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
      - name:  Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: athlos-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          
      - name:  Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: athlos-ios-build
          path: build/ios/iphoneos


  deploy:
    name:  Deploy App
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main'
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        
      - name:  Extract version from branch name
        id: extract_version
        run: |
          if [[ ${{ github.ref }} == refs/heads/release/* ]]; then
            # Extraer versión de la rama release/v1.2.3
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            VERSION=${BRANCH_NAME#release/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=ATHLOS v$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          else
            # Para main, usar run number
            echo "version=${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "release_name=ATHLOS v${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
        
      - name:  Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_version.outputs.tag_name }}
          release_name: ${{ steps.extract_version.outputs.release_name }}
          draft: false
          prerelease: ${{ startsWith(github.ref, 'refs/heads/release/') }}
          body: |
            **ATHLOS App Release**
            
            **Version:** ${{ steps.extract_version.outputs.version }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ## **Builds Disponibles:**
            - **Android APK:** Descarga directa
            - **Android App Bundle:** Para Google Play Store
            - **iOS Build:** Para TestFlight
            
            ## **Cambios en esta versión:**
            - Mejoras de rendimiento
            - Correcciones de bugs
            - Nuevas funcionalidades
            
            ---
            *Build automático generado por GitHub Actions*
          
      - name:  Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: athlos-android-apk
          path: ./dist
          
      - name:  Download Android App Bundle
        uses: actions/download-artifact@v4
        with:
          name: athlos-android-aab
          path: ./dist
          
      - name:  Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/app-release.apk
          asset_name: ATHLOS-Android-v${{ steps.extract_version.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
          
      - name:  Upload App Bundle
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_name: ATHLOS-Android-v${{ steps.extract_version.outputs.version }}.aab
          asset_path: ./dist/app-release.aab
          asset_content_type: application/octet-stream


  code-quality:
    name:  Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        
      - name:  Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          
      - name:  Get dependencies
        run: flutter pub get
        
      - name:  Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        
      - name:  Generate metrics
        run: |
          flutter pub global activate dart_code_metrics
          dart_code_metrics analyze lib --reporter=html --output-directory=metrics
          
      - name:  Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: code-metrics
          path: metrics/


  security:
    name:  Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        
      - name:  Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name:  Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
